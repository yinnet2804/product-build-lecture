<body>
  <div class="container">
    <h1>Lotto Number Generator</h1>
    <div class="numbers"></div>
    <button id="generate">Generate Numbers</button>

    <div class="probabilities">
      <h2>당첨 확률 (Winning Probabilities)</h2>
      <ul>
        <li>1등 (6개 일치): 1 / 8,145,060</li>
        <li>2등 (5개 + 보너스 일치): 1 / 1,357,510</li>
        <li>3등 (5개 일치): 1 / 34,808</li>
        <li>4등 (4개 일치): 1 / 733</li>
        <li>5등 (3개 일치): 1 / 45</li>
      </ul>
    </div>
    <div class="visitor-counter" aria-live="polite">
      <p class="visitor-label notranslate">방문자 수</p>
      <p class="visitor-value notranslate" id="visitor-count">집계 중...</p>
      <p class="visitor-note notranslate" id="visitor-note">현재 브라우저 기준입니다.</p>
    </div>
  </div>

  <div id="test-container">
      <button id="run-tests">Run Tests</button>
      <div id="test-results"></div>
  </div>
