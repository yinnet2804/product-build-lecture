<!doctype html>
<html lang="ko" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>

<body>
  <div class="container">
    <h1>Lotto Number Generator</h1>
    <div class="numbers"></div>
    <button id="generate">Generate Numbers</button>

    <div class="probabilities">
      <h2>당첨 확률 (Winning Probabilities)</h2>
      <ul>
        <li>1등 (6개 일치): 1 / 8,145,060</li>
        <li>2등 (5개 + 보너스 일치): 1 / 1,357,510</li>
        <li>3등 (5개 일치): 1 / 34,808</li>
        <li>4등 (4개 일치): 1 / 733</li>
        <li>5등 (3개 일치): 1 / 45</li>
      </ul>
    </div>
    <div class="visitor-counter" aria-live="polite">
      <p class="visitor-label notranslate">방문자 수</p>
      <p class="visitor-value notranslate" id="visitor-count">집계 중...</p>
      <p class="visitor-note notranslate" id="visitor-note">현재 브라우저 기준입니다.</p>
    </div>

    <div class="contact-form">
      <h2>제휴 문의 (Partnership Inquiry)</h2>
      <form action="https://formspree.io/f/xqegalbg" method="POST">
        <div class="form-group">
          <label for="name">성함 / 업체명</label>
          <input type="text" id="name" name="name" required placeholder="홍길동 / (주)컴퍼니">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
        </div>
        <button type="submit" id="submit-form">문의 보내기</button>
      </form>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
